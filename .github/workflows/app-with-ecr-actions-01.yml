name: Build and Push Docker Image To AWS ECR
on:
  push:
    branches:
      - main

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    - name: Build, tag, and push docker image to Amazon ECR Private
      run: |
        aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ ECR_PRIVATE_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
        docker build -t ${{ ECR_PRIVATE_REPOSITORY }} .
        docker push ${{ ECR_PRIVATE_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com/${{ ECR_PRIVATE_REPOSITORY }}:latest
